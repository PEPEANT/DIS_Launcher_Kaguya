<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>카구야 관리자 지급 내역</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Do+Hyeon&family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="admin-shell">
      <header class="admin-header">
        <div>
          <p class="admin-eyebrow">지급 내역</p>
          <h1>시즌 보상 지급 완료 내역</h1>
        </div>
        <div class="admin-header-actions">
          <a href="./index.html" class="refresh-button refresh-button--secondary">관리자 홈</a>
          <button id="payoutRefreshButton" type="button" class="refresh-button">새로고침</button>
        </div>
      </header>

      <section class="panel-card">
        <div class="panel-head">
          <h2>조회 조건</h2>
          <p id="payoutStatus">지급 내역을 불러오는 중...</p>
        </div>
        <form class="admin-form-grid">
          <label class="admin-field">
            <span>시즌</span>
            <select id="payoutSeason"></select>
          </label>
          <label class="admin-field">
            <span>표시 수</span>
            <input id="payoutLimit" type="number" min="0" step="1" value="200" placeholder="0이면 전체">
          </label>
          <div class="admin-button-row admin-field--wide">
            <button id="payoutLoadButton" type="button" class="refresh-button">지급 완료 내역 보기</button>
          </div>
        </form>
      </section>

      <section class="admin-stats admin-stats--compact">
        <article class="stat-card">
          <span>지급 완료 인원</span>
          <strong id="payoutRecipientCount">-</strong>
        </article>
        <article class="stat-card">
          <span>총 지급 후쥬</span>
          <strong id="payoutRewardTotal">-</strong>
        </article>
        <article class="stat-card">
          <span>최근 지급 시각</span>
          <strong id="payoutLastRewardedAt">-</strong>
        </article>
      </section>

      <section class="panel-card">
        <div class="panel-head">
          <h2>지급 완료 목록</h2>
          <p id="payoutResultMeta">아직 불러오지 않았습니다.</p>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>지급 시각</th>
                <th>닉네임</th>
                <th>순위</th>
                <th>보상</th>
                <th>점수</th>
                <th>UID</th>
                <th>playerId</th>
              </tr>
            </thead>
            <tbody id="payoutTableBody">
              <tr class="empty-row">
                <td colspan="7">지급 내역을 불러오는 중입니다.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="../app-config.js"></script>
    <script type="module" src="./payouts.js"></script>
  </body>
</html>
